name: worker

permissions:
  contents: read
  actions: write 
env:

  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }} 
  
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }} 
  
  
on:
  #schedule:
    #- cron: "5 16 * * *"
  push:
    paths:
      - 'worker.js'    
  workflow_dispatch: # 支持手动点击触发
 
jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
    
      - name: push worker.js
        run: |
        
          REPO_NAME=$(basename "${GITHUB_REPOSITORY}")
          echo "$REPO_NAME"   
          # 🌟 新增这一步：捕获真正的任务开始时间，并写入全局环境变量
        
        
          curl -sS -X PUT "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$REPO_NAME"      -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"      -F "metadata={\"main_module\": \"worker.js\"};type=application/json"      -F "worker.js=@worker.js;type=application/javascript+module"